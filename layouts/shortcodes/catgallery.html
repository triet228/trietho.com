<style>
  .cat-pic {
    width: 500px;
    background: white;
    border-radius: 10px;
    margin: 20px auto;
    display: block;
  }
</style>

{{ range readDir "static/trietcat" }}
  {{ if strings.HasSuffix .Name ".jpg" }}
    <img src="/trietcat/{{ .Name }}" alt="Triet's Cat" class="cat-pic">
  {{ end }}
{{ end }}
